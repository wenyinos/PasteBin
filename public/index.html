<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PasteBin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f5f5; }
    .paste-card { margin-bottom: 15px; }
    .paste-content { white-space: pre-wrap; word-break: break-all; background: #fff; padding: 15px; border-radius: 5px; border: 1px solid #dee2e6; max-height: 200px; overflow-y: auto; }
    .navbar-brand { font-weight: bold; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">PasteBin</a>
      <div class="d-flex">
        <span id="usernameDisplay" class="navbar-text me-3"></span>
        <button id="logoutBtn" class="btn btn-outline-light btn-sm" style="display:none;">退出</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="authSection">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card">
            <div class="card-header">
              <ul class="nav nav-tabs card-header-tabs" id="authTabs" role="tablist">
                <li class="nav-item">
                  <button class="nav-link active" id="loginTab" data-bs-toggle="tab" data-bs-target="#loginPane" type="button">登录</button>
                </li>
                <li class="nav-item">
                  <button class="nav-link" id="registerTab" data-bs-toggle="tab" data-bs-target="#registerPane" type="button">注册</button>
                </li>
              </ul>
            </div>
            <div class="card-body">
              <div class="tab-content">
                <div class="tab-pane fade show active" id="loginPane">
                  <form id="loginForm">
                    <div class="mb-3">
                      <label class="form-label">用户名</label>
                      <input type="text" class="form-control" id="loginUsername" required>
                    </div>
                    <div class="mb-3">
                      <label class="form-label">密码</label>
                      <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                  </form>
                </div>
                <div class="tab-pane fade" id="registerPane">
                  <form id="registerForm">
                    <div class="mb-3">
                      <label class="form-label">用户名</label>
                      <input type="text" class="form-control" id="registerUsername" required>
                    </div>
                    <div class="mb-3">
                      <label class="form-label">密码</label>
                      <input type="password" class="form-control" id="registerPassword" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">注册</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="mainSection" style="display:none;">
      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title">新建Paste</h5>
          <textarea class="form-control mb-3" id="pasteContent" rows="6" placeholder="输入内容..."></textarea>
          <button class="btn btn-primary" id="savePasteBtn">保存</button>
        </div>
      </div>
      <h5>我的Pastes</h5>
      <div id="pastesList"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_URL = 'http://localhost:3000/api';
    let token = localStorage.getItem('token');

    function showSection(section) {
      document.getElementById('authSection').style.display = section === 'auth' ? 'block' : 'none';
      document.getElementById('mainSection').style.display = section === 'main' ? 'block' : 'none';
    }

    function updateUI() {
      if (token) {
        const user = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('usernameDisplay').textContent = user.username;
        document.getElementById('logoutBtn').style.display = 'block';
        showSection('main');
        loadPastes();
      } else {
        document.getElementById('usernameDisplay').textContent = '';
        document.getElementById('logoutBtn').style.display = 'none';
        showSection('auth');
      }
    }

    async function loadPastes() {
      const res = await fetch(`${API_URL}/pastes`, { headers: { Authorization: `Bearer ${token}` } });
      const pastes = await res.json();
      const list = document.getElementById('pastesList');
      if (pastes.length === 0) {
        list.innerHTML = '<p class="text-muted">暂无内容</p>';
        return;
      }
      list.innerHTML = pastes.map(p => `
        <div class="card paste-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <small class="text-muted">${new Date(p.created_at).toLocaleString()}</small>
              <button class="btn btn-sm btn-outline-danger" onclick="deletePaste(${p.id})">删除</button>
            </div>
            <div class="paste-content mt-2">${escapeHtml(p.content)}</div>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function deletePaste(id) {
      if (!confirm('确定删除?')) return;
      await fetch(`${API_URL}/pastes/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      loadPastes();
    }

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const res = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: document.getElementById('loginUsername').value, password: document.getElementById('loginPassword').value })
      });
      const data = await res.json();
      if (res.ok) {
        token = data.token;
        localStorage.setItem('token', token);
        updateUI();
      } else {
        alert(data.error);
      }
    };

    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const res = await fetch(`${API_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: document.getElementById('registerUsername').value, password: document.getElementById('registerPassword').value })
      });
      const data = await res.json();
      if (res.ok) {
        alert('注册成功，请登录');
        document.getElementById('loginTab').click();
      } else {
        alert(data.error);
      }
    };

    document.getElementById('savePasteBtn').onclick = async () => {
      const content = document.getElementById('pasteContent').value;
      if (!content.trim()) return alert('内容不能为空');
      const res = await fetch(`${API_URL}/pastes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ content })
      });
      if (res.ok) {
        document.getElementById('pasteContent').value = '';
        loadPastes();
      }
    };

    document.getElementById('logoutBtn').onclick = () => {
      token = null;
      localStorage.removeItem('token');
      updateUI();
    };

    updateUI();
  </script>
</body>
</html>

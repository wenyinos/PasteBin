<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code PasteBin</title>
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/pixel.css" rel="stylesheet">
  <link href="/css/prism-tomorrow.min.css" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Nunito Sans';
      font-style: normal;
      font-weight: 300;
      font-display: swap;
      src: url(/fonts/nunito-sans-300.ttf) format('truetype');
    }
    @font-face {
      font-family: 'Nunito Sans';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url(/fonts/nunito-sans-400.ttf) format('truetype');
    }
    @font-face {
      font-family: 'Nunito Sans';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url(/fonts/nunito-sans-600.ttf) format('truetype');
    }
    @font-face {
      font-family: 'Nunito Sans';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url(/fonts/nunito-sans-700.ttf) format('truetype');
    }

    /* 代码块样式 */
    pre {
      margin: 0;
      background: #1f1e34 !important;
      border-radius: .3rem;
      padding: 1rem;
      overflow: auto;
    }
    code {
      font-family: 'Fira Code', 'Consolas', 'Monaco', monospace;
      font-size: 0.875rem;
      background: transparent !important;
    }

    /* 代码摘要 */
    .paste-summary {
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 60px;
      overflow: hidden;
      color: #6b7280;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    /* 加载动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .paste-card { animation: fadeIn 0.3s ease; }

    /* 分享链接 */
    .share-link { word-break: break-all; }
  </style>
</head>
<body>

  <!-- 导航栏 -->
  <header class="header-global">
    <nav id="navbar-main" class="navbar navbar-expand-lg navbar-theme-primary headroom navbar-dark">
      <div class="container position-relative">
        <a class="navbar-brand me-lg-3" href="?">Code PasteBin</a>

        <!-- 居中新建按钮 -->
        <div class="flex-grow-1 d-none d-lg-flex justify-content-center">
          <button id="newPasteBtn" class="btn btn-tertiary btn-sm" onclick="showCreateModal()" style="display:none;">
            <i class="bi bi-plus-circle me-1"></i>新建代码片段
          </button>
        </div>

        <!-- 右侧导航 -->
        <div class="d-flex align-items-center">
          <div id="userNav" style="display:none;">
            <span id="usernameDisplay" class="text-white me-3 font-small"></span>
            <button id="logoutBtn" class="btn btn-outline-white btn-sm me-2">退出</button>
          </div>
          <div id="guestNav">
            <button class="btn btn-outline-white btn-sm me-2" onclick="showAuthModal('login')">登录</button>
            <button class="btn btn-outline-white btn-sm me-2" onclick="showAuthModal('register')">注册</button>
          </div>
          <a href="https://wenyinos.com" class="btn btn-outline-white btn-sm d-none d-lg-inline-flex" target="_blank">
            <i class="bi bi-house me-1"></i>项目主页
          </a>
          <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMobile">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <!-- 公共查看视图 -->
    <section class="section section-sm" id="publicView" style="display:none;">
      <div class="container">
        <div class="card border-0 shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-person-circle me-2"></i>来自: <strong id="pasteAuthor"></strong></span>
            <div>
              <span id="displayPasteLanguage" class="badge bg-tertiary me-2"></span>
              <small class="text-gray font-small" id="pasteTime"><i class="bi bi-clock me-1"></i></small>
            </div>
          </div>
          <div class="card-body">
            <pre><code id="publicContent" class="language-plaintext"></code></pre>
          </div>
          <div class="card-footer bg-white border-0">
            <a id="shareLink" href="#" class="btn btn-sm btn-tertiary">
              <i class="bi bi-link-45deg me-1"></i>分享链接
            </a>
            <button class="btn btn-sm btn-outline-soft ms-2" onclick="copyAllCode(this)">
              <i class="bi bi-clipboard me-1"></i>全部复制
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- 主内容区域 -->
    <section class="section section-sm" id="mainSection">
      <div class="container">
        <div class="d-flex align-items-center mb-4">
          <h4 class="fw-bold mb-0">最新分享</h4>
          <button class="btn btn-sm btn-outline-soft ms-3" onclick="loadAllPastes()">
            <i class="bi bi-arrow-clockwise me-1"></i>刷新
          </button>
        </div>
        <div id="pastesList" data-v="20260410a"></div>
      </div>
    </section>
  </main>

  <!-- 登录/注册模态框 -->
  <div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="authModalTitle">登录</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="loginForm">
            <form onsubmit="event.preventDefault(); doLogin();">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input type="text" class="form-control" id="loginUsername" required>
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">验证码</label>
              <div class="input-group">
                <input type="text" class="form-control" id="loginCaptcha" placeholder="请输入答案" required>
                <button class="btn btn-outline-soft" type="button" onclick="refreshCaptcha()">刷新</button>
              </div>
              <div id="loginCaptchaQuestion" class="text-gray font-small mt-1"></div>
            </div>
            <button type="submit" class="btn btn-tertiary w-100">登录</button>
            </form>
          </div>
          <div id="registerForm" style="display:none;">
            <form onsubmit="event.preventDefault(); doRegister();">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input type="text" class="form-control" id="registerUsername" required>
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input type="password" class="form-control" id="registerPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">验证码</label>
              <div class="input-group">
                <input type="text" class="form-control" id="registerCaptcha" placeholder="请输入答案" required>
                <button class="btn btn-outline-soft" type="button" onclick="refreshCaptcha()">刷新</button>
              </div>
              <div id="registerCaptchaQuestion" class="text-gray font-small mt-1"></div>
            </div>
            <button type="submit" class="btn btn-tertiary w-100">注册</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 新建Paste模态框 -->
  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">新建Paste</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">语言</label>
            <select class="form-select" id="pasteLanguage">
              <option value="plaintext">纯文本</option>
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="csharp">C#</option>
              <option value="cpp">C++</option>
              <option value="c">C</option>
              <option value="go">Go</option>
              <option value="rust">Rust</option>
              <option value="php">PHP</option>
              <option value="ruby">Ruby</option>
              <option value="swift">Swift</option>
              <option value="kotlin">Kotlin</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="scss">SCSS</option>
              <option value="json">JSON</option>
              <option value="xml">XML</option>
              <option value="yaml">YAML</option>
              <option value="markdown">Markdown</option>
              <option value="sql">SQL</option>
              <option value="bash">Bash</option>
              <option value="powershell">PowerShell</option>
              <option value="dockerfile">Dockerfile</option>
            </select>
          </div>
          <textarea class="form-control mb-3" id="pasteContent" rows="10" placeholder="输入内容..."></textarea>
          <button class="btn btn-tertiary" onclick="doCreatePaste()">
            <i class="bi bi-check-lg me-1"></i>保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer pt-5 pb-4 bg-dark text-white">
    <div class="container">
      <div class="d-flex flex-column align-items-center">
        <p class="fw-bold mb-2">Code PasteBin</p>
        <div class="mb-2">
          <a href="https://github.com/wenyinos/PasteBin" target="_blank" class="text-white text-decoration-none me-3">
            <i class="bi bi-github"></i> GitHub
          </a>
          <a href="https://wenyinos.com" target="_blank" class="text-white text-decoration-none">
            <i class="bi bi-house"></i> 项目主页
          </a>
        </div>
        <small class="text-gray">Copyleft &copy; 玟茵开源社区 2013-2026</small>
      </div>
    </div>
  </footer>

  <script src="/js/bootstrap.bundle.min.js"></script>
  <script src="/js/smooth-scroll.min.js"></script>
  <script src="/js/pixel.js"></script>
  <script src="/js/prism.js"></script>
  <script src="/js/components/prism-markup.min.js"></script>
  <script src="/js/components/prism-css.min.js"></script>
  <script src="/js/components/prism-clike.min.js"></script>
  <script src="/js/components/prism-javascript.min.js"></script>
  <script src="/js/components/prism-typescript.min.js"></script>
  <script src="/js/components/prism-python.min.js"></script>
  <script src="/js/components/prism-java.min.js"></script>
  <script src="/js/components/prism-c.min.js"></script>
  <script src="/js/components/prism-cpp.min.js"></script>
  <script src="/js/components/prism-csharp.min.js"></script>
  <script src="/js/components/prism-go.min.js"></script>
  <script src="/js/components/prism-rust.min.js"></script>
  <script src="/js/components/prism-markup-templating.min.js"></script>
  <script src="/js/components/prism-php.min.js"></script>
  <script src="/js/components/prism-ruby.min.js"></script>
  <script src="/js/components/prism-swift.min.js"></script>
  <script src="/js/components/prism-kotlin.min.js"></script>
  <script src="/js/components/prism-scss.min.js"></script>
  <script src="/js/components/prism-json.min.js"></script>
  <script src="/js/components/prism-yaml.min.js"></script>
  <script src="/js/components/prism-markdown.min.js"></script>
  <script src="/js/components/prism-sql.min.js"></script>
  <script src="/js/components/prism-bash.min.js"></script>
  <script src="/js/components/prism-powershell.min.js"></script>
  <script src="/js/components/prism-docker.min.js"></script>
  <script>
    const API_URL = '/api';
    let token = localStorage.getItem('token');
    let authModal, createModal;
    let captchaKey = '';

    const langLabels = {
      plaintext: '纯文本', javascript: 'JavaScript', typescript: 'TypeScript',
      python: 'Python', java: 'Java', csharp: 'C#', cpp: 'C++', c: 'C',
      go: 'Go', rust: 'Rust', php: 'PHP', ruby: 'Ruby', swift: 'Swift',
      kotlin: 'Kotlin', html: 'HTML', css: 'CSS', scss: 'SCSS',
      json: 'JSON', xml: 'XML', yaml: 'YAML', markdown: 'Markdown',
      sql: 'SQL', bash: 'Bash', powershell: 'PowerShell', dockerfile: 'Dockerfile'
    };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    function decodeJwtPayload(jwtToken) {
      try {
        if (!jwtToken) return null;
        const parts = jwtToken.split('.');
        if (parts.length < 2) return null;
        let payload = parts[1].replace(/-/g, '+').replace(/_/g, '/');
        while (payload.length % 4 !== 0) payload += '=';
        return JSON.parse(atob(payload));
      } catch {
        return null;
      }
    }

    function getCurrentUser() {
      const payload = decodeJwtPayload(token);
      if (!payload || typeof payload !== 'object') return null;
      if (!payload.username) return null;
      return payload;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      authModal = new bootstrap.Modal(document.getElementById('authModal'));
      createModal = new bootstrap.Modal(document.getElementById('createModal'));
      updateNav();

      const shortCode = getQueryParam('s');
      if (shortCode) {
        const loaded = await loadPublicPaste();
        if (!loaded) await loadAllPastes();
      } else {
        await loadAllPastes();
      }
    });

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    async function loadPublicPaste() {
      const shortCode = getQueryParam('s');
      if (!shortCode) return false;

      try {
        const res = await fetch('/api/paste/' + shortCode);
        if (!res.ok) return false;

        const paste = await res.json();

        document.getElementById('pasteAuthor').textContent = paste.username;
        document.getElementById('pasteTime').textContent = new Date(paste.created_at).toLocaleString();
        document.getElementById('displayPasteLanguage').textContent = langLabels[paste.language] || paste.language;

        const codeEl = document.getElementById('publicContent');
        codeEl.className = '';
        codeEl.classList.add('language-' + (paste.language || 'plaintext'));
        codeEl.textContent = paste.content;

        try { Prism.highlightElement(codeEl); } catch (e) { console.warn('Prism highlight failed:', e); }

        const fullUrl = window.location.origin + window.location.pathname + '?s=' + paste.short_code;
        document.getElementById('shareLink').href = fullUrl;
        document.getElementById('shareLink').innerHTML = '<i class="bi bi-link-45deg me-1"></i>分享链接: ' + fullUrl;

        document.getElementById('mainSection').style.display = 'none';
        document.getElementById('publicView').style.display = 'block';

        return true;
      } catch (e) {
        return false;
      }
    }

    function updateNav() {
      try {
        if (token) {
          const user = getCurrentUser();
          if (!user) throw new Error('Invalid token payload');
          document.getElementById('usernameDisplay').textContent = user.username;
          document.getElementById('userNav').style.display = 'flex';
          document.getElementById('guestNav').style.display = 'none';
          document.getElementById('newPasteBtn').style.display = 'inline-block';
        } else {
          document.getElementById('userNav').style.display = 'none';
          document.getElementById('guestNav').style.display = 'flex';
          document.getElementById('newPasteBtn').style.display = 'none';
        }
      } catch (e) {
        console.error('updateNav error:', e);
        token = null;
        localStorage.removeItem('token');
        document.getElementById('userNav').style.display = 'none';
        document.getElementById('guestNav').style.display = 'flex';
        document.getElementById('newPasteBtn').style.display = 'none';
      }
    }

    async function loadAllPastes() {
      try {
        const res = await fetch('/api/pastes/all');
        if (!res.ok) throw new Error('API error: ' + res.status);
        const pastes = await res.json();

        document.getElementById('mainSection').style.display = 'block';
        document.getElementById('publicView').style.display = 'none';

        const list = document.getElementById('pastesList');
        if (!pastes.length) {
          list.innerHTML = '<p class="text-gray text-center font-small">暂无内容</p>';
          return;
        }
        const currentUser = getCurrentUser();
        list.innerHTML = pastes.map(p => {
          const isOwner = !!(currentUser && currentUser.username === p.username);
          const safeUsername = escapeHtml(p.username);
          const safeLanguage = escapeHtml(langLabels[p.language] || p.language);
          return `
          <div class="card border-0 shadow-sm paste-card mb-3">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                  <span class="badge bg-tertiary"><i class="bi bi-code-square me-1"></i>${safeLanguage}</span>
                  <span class="text-gray font-small ms-2"><i class="bi bi-person me-1"></i>${safeUsername}</span>
                  <small class="text-gray font-small ms-2"><i class="bi bi-clock me-1"></i>${new Date(p.created_at).toLocaleString()}</small>
                </div>
                <div>
                  <a href="?s=${p.short_code}" class="btn btn-sm btn-tertiary">
                    <i class="bi bi-eye me-1"></i>访问
                  </a>
                  ${isOwner ? `<button class="btn btn-sm btn-outline-danger ms-1" onclick="deletePaste(${p.id})"><i class="bi bi-trash me-1"></i>删除</button>` : ''}
                </div>
              </div>
              <div class="paste-summary">${escapeHtml(p.content)}</div>
            </div>
          </div>
        `}).join('');
      } catch (e) {
        console.error(e);
        document.getElementById('mainSection').style.display = 'block';
        document.getElementById('publicView').style.display = 'none';
        const errorMsg = e.message || e.toString() || 'Unknown error';
        const errP = document.createElement('p');
        errP.className = 'text-gray text-center font-small';
        errP.textContent = '加载失败: ' + errorMsg;
        document.getElementById('pastesList').textContent = '';
        document.getElementById('pastesList').appendChild(errP);
      }
    }

    async function deletePaste(id) {
      if (!confirm('确定要删除这条代码吗？')) return;
      try {
        const res = await fetch(`${API_URL}/pastes/${id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
        if (res.ok) loadAllPastes();
        else {
          const data = await res.json();
          alert(data.error || '删除失败');
        }
      } catch (e) {
        alert('删除失败: ' + e.message);
      }
    }

    function copyAllCode(btn) {
      const code = document.getElementById('publicContent').textContent;
      const originalHtml = btn.innerHTML;

      function onSuccess() {
        btn.innerHTML = '<i class="bi bi-check me-1"></i>已复制';
        btn.disabled = true;
        setTimeout(() => { btn.innerHTML = originalHtml; btn.disabled = false; }, 2000);
      }

      if (navigator.clipboard) {
        navigator.clipboard.writeText(code).then(onSuccess).catch(() => fallbackCopy());
      } else {
        fallbackCopy();
      }

      function fallbackCopy() {
        const textarea = document.createElement('textarea');
        textarea.value = code;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try { document.execCommand('copy'); onSuccess(); }
        catch { alert('复制失败，请手动选择复制'); }
        document.body.removeChild(textarea);
      }
    }

    function showAuthModal(type) {
      document.getElementById('authModalTitle').textContent = type === 'login' ? '登录' : '注册';
      document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
      refreshCaptcha();
      authModal.show();
    }

    async function refreshCaptcha() {
      try {
        const res = await fetch(`${API_URL}/captcha`);
        const data = await res.json();
        captchaKey = data.key;
        document.getElementById('loginCaptchaQuestion').textContent = data.question;
        document.getElementById('registerCaptchaQuestion').textContent = data.question;
        document.getElementById('loginCaptcha').value = '';
        document.getElementById('registerCaptcha').value = '';
      } catch (e) {
        console.error('Failed to load captcha:', e);
      }
    }

    async function doLogin() {
      const res = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('loginUsername').value,
          password: document.getElementById('loginPassword').value,
          captchaKey: captchaKey,
          captchaAnswer: document.getElementById('loginCaptcha').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        token = data.token;
        localStorage.setItem('token', token);
        authModal.hide();
        updateNav();
        loadAllPastes();
      } else {
        alert(data.error);
        refreshCaptcha();
      }
    }

    async function doRegister() {
      const res = await fetch(`${API_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('registerUsername').value,
          password: document.getElementById('registerPassword').value,
          captchaKey: captchaKey,
          captchaAnswer: document.getElementById('registerCaptcha').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        alert('注册成功，请登录');
        showAuthModal('login');
      } else {
        alert(data.error);
      }
    }

    function showCreateModal() {
      document.getElementById('pasteContent').value = '';
      document.getElementById('pasteLanguage').value = 'plaintext';
      createModal.show();
    }

    async function doCreatePaste() {
      const content = document.getElementById('pasteContent').value;
      const language = document.getElementById('pasteLanguage').value;
      if (!content.trim()) return alert('内容不能为空');
      const res = await fetch(`${API_URL}/pastes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ content, language })
      });
      if (!res.ok) {
        let msg = `创建失败 (${res.status})`;
        try { const data = await res.json(); if (data && data.error) msg = data.error; } catch {}
        alert(msg);
        if (res.status === 401) {
          token = null;
          localStorage.removeItem('token');
          updateNav();
        }
        return;
      }
      const data = await res.json();
      createModal.hide();
      window.location.href = '?s=' + data.short_code;
    }

    document.getElementById('logoutBtn').onclick = () => {
      token = null;
      localStorage.removeItem('token');
      updateNav();
      loadAllPastes();
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PasteBin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f5f5; }
    .paste-card { margin-bottom: 15px; }
    .paste-content { white-space: pre-wrap; word-break: break-all; background: #fff; padding: 15px; border-radius: 5px; border: 1px solid #dee2e6; max-height: 200px; overflow-y: auto; }
    .navbar-brand { font-weight: bold; }
    .share-link { word-break: break-all; }
    pre { margin: 0; background: #2d2d2d; border-radius: 5px; padding: 15px; max-height: 400px; overflow: auto; }
    code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 14px; }
    .paste-summary { 
      white-space: pre-wrap; 
      word-break: break-all; 
      max-height: 60px; 
      overflow: hidden; 
      color: #6c757d;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="?">PasteBin</a>
      <div class="d-flex align-items-center">
        <div id="userNav" style="display:none;">
          <span id="usernameDisplay" class="navbar-text me-3"></span>
          <button class="btn btn-outline-light btn-sm me-2" onclick="showCreateModal()">新建</button>
          <button id="logoutBtn" class="btn btn-outline-light btn-sm">退出</button>
        </div>
        <div id="guestNav">
          <button class="btn btn-outline-light btn-sm me-2" onclick="showAuthModal('login')">登录</button>
          <button class="btn btn-outline-light btn-sm" onclick="showAuthModal('register')">注册</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="publicView" style="display:none;">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>来自: <strong id="pasteAuthor"></strong></span>
          <div>
            <span id="pasteLanguage" class="badge bg-secondary me-2"></span>
            <small class="text-muted" id="pasteTime"></small>
          </div>
        </div>
        <div class="card-body">
          <pre><code id="publicContent" class="language-plaintext"></code></pre>
        </div>
        <div class="card-footer">
          <a id="shareLink" href="#" class="btn btn-sm btn-outline-primary"></a>
        </div>
      </div>
    </div>

    <div id="mainSection">
      <div class="row mb-3">
        <div class="col">
          <h4 class="d-inline">最新分享</h4>
          <button class="btn btn-sm btn-outline-secondary ms-2" onclick="loadAllPastes()">刷新</button>
        </div>
      </div>
      <div id="pastesList" data-v="20260410a"></div>
    </div>
  </div>

  <div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="authModalTitle">登录</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="loginForm">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input type="text" class="form-control" id="loginUsername" required>
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">验证码</label>
              <div class="input-group">
                <input type="text" class="form-control" id="loginCaptcha" placeholder="请输入答案" required>
                <button class="btn btn-outline-secondary" type="button" onclick="refreshCaptcha()">刷新</button>
              </div>
              <div id="loginCaptchaQuestion" class="text-muted small mt-1"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100" onclick="doLogin()">登录</button>
          </div>
          <div id="registerForm" style="display:none;">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input type="text" class="form-control" id="registerUsername" required>
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input type="password" class="form-control" id="registerPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">验证码</label>
              <div class="input-group">
                <input type="text" class="form-control" id="registerCaptcha" placeholder="请输入答案" required>
                <button class="btn btn-outline-secondary" type="button" onclick="refreshCaptcha()">刷新</button>
              </div>
              <div id="registerCaptchaQuestion" class="text-muted small mt-1"></div>
            </div>
            <button type="submit" class="btn btn-success w-100" onclick="doRegister()">注册</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">新建Paste</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">语言</label>
            <select class="form-select" id="pasteLanguage">
              <option value="plaintext">纯文本</option>
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="csharp">C#</option>
              <option value="cpp">C++</option>
              <option value="c">C</option>
              <option value="go">Go</option>
              <option value="rust">Rust</option>
              <option value="php">PHP</option>
              <option value="ruby">Ruby</option>
              <option value="swift">Swift</option>
              <option value="kotlin">Kotlin</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="scss">SCSS</option>
              <option value="json">JSON</option>
              <option value="xml">XML</option>
              <option value="yaml">YAML</option>
              <option value="markdown">Markdown</option>
              <option value="sql">SQL</option>
              <option value="bash">Bash</option>
              <option value="powershell">PowerShell</option>
              <option value="dockerfile">Dockerfile</option>
            </select>
          </div>
          <textarea class="form-control mb-3" id="pasteContent" rows="10" placeholder="输入内容..."></textarea>
          <button class="btn btn-primary" onclick="doCreatePaste()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center text-muted mt-5 py-3 border-top">
    <small>&copy; 2026 wenyinos. All rights reserved.</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-csharp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup-templating.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-php.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-ruby.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-kotlin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-scss.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-powershell.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-docker.min.js"></script>
  <script>
    const API_URL = '/api';
    let token = localStorage.getItem('token');
    let authModal, createModal;
    let captchaKey = '';

    const langLabels = {
      plaintext: '纯文本', javascript: 'JavaScript', typescript: 'TypeScript',
      python: 'Python', java: 'Java', csharp: 'C#', cpp: 'C++', c: 'C',
      go: 'Go', rust: 'Rust', php: 'PHP', ruby: 'Ruby', swift: 'Swift',
      kotlin: 'Kotlin', html: 'HTML', css: 'CSS', scss: 'SCSS',
      json: 'JSON', xml: 'XML', yaml: 'YAML', markdown: 'Markdown',
      sql: 'SQL', bash: 'Bash', powershell: 'PowerShell', dockerfile: 'Dockerfile'
    };

    document.addEventListener('DOMContentLoaded', async () => {
      console.log('Page loaded');
      authModal = new bootstrap.Modal(document.getElementById('authModal'));
      createModal = new bootstrap.Modal(document.getElementById('createModal'));
      updateNav();
      
      const shortCode = getQueryParam('s');
      console.log('shortCode:', shortCode);
      
      if (shortCode) {
        console.log('Loading public paste...');
        const loaded = await loadPublicPaste();
        console.log('loadPublicPaste result:', loaded);
        if (!loaded) {
          console.log('Failed to load paste, loading list...');
          await loadAllPastes();
        }
      } else {
        console.log('No shortCode, loading list...');
        await loadAllPastes();
      }
    });

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    async function loadPublicPaste() {
      const shortCode = getQueryParam('s');
      console.log('loadPublicPaste, shortCode:', shortCode);
      if (!shortCode) return false;
      
      try {
        const url = '/api/paste/' + shortCode;
        console.log('Fetching:', url);
        const res = await fetch(url);
        console.log('Response status:', res.status);
        if (!res.ok) return false;
        
        const paste = await res.json();
        console.log('Paste:', paste);
        document.getElementById('pasteAuthor').textContent = paste.username;
        document.getElementById('pasteTime').textContent = new Date(paste.created_at).toLocaleString();
        document.getElementById('pasteLanguage').textContent = langLabels[paste.language] || paste.language;
        const codeEl = document.getElementById('publicContent');
        codeEl.className = `language-${paste.language}`;
        codeEl.textContent = paste.content;
        try {
          Prism.highlightElement(codeEl);
        } catch (e) {
          console.warn('Prism highlight failed:', e);
        }
        const fullUrl = window.location.origin + '?s=' + paste.short_code;
        document.getElementById('shareLink').href = fullUrl;
        document.getElementById('shareLink').textContent = '分享链接: ' + fullUrl;
        document.getElementById('mainSection').style.display = 'none';
        document.getElementById('publicView').style.display = 'block';
        return true;
      } catch (e) { 
        console.error('loadPublicPaste error:', e);
        return false; 
      }
    }

    function updateNav() {
      if (token) {
        const user = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('usernameDisplay').textContent = user.username;
        document.getElementById('userNav').style.display = 'flex';
        document.getElementById('guestNav').style.display = 'none';
      } else {
        document.getElementById('userNav').style.display = 'none';
        document.getElementById('guestNav').style.display = 'block';
      }
    }

    async function loadAllPastes() {
      try {
        const res = await fetch('/api/pastes/all');
        if (!res.ok) throw new Error('API error: ' + res.status);
        const pastes = await res.json();
        const list = document.getElementById('pastesList');
        if (!pastes.length) {
          list.innerHTML = '<p class="text-muted text-center">暂无内容</p>';
          return;
        }
        list.innerHTML = pastes.map(p => `
          <div class="card paste-card">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                  <span class="badge bg-secondary">${langLabels[p.language] || p.language}</span>
                  <span class="text-muted ms-2">${p.username}</span>
                  <small class="text-muted ms-2">${new Date(p.created_at).toLocaleString()}</small>
                </div>
                <a href="?s=${p.short_code}" class="btn btn-sm btn-outline-primary">访问</a>
              </div>
              <div class="paste-summary">${escapeHtml(p.content)}</div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
        document.getElementById('pastesList').innerHTML = '<p class="text-muted text-center">加载失败: ' + (e.message || e.toString()) + '</p>';
      }
    }

    function updateNav() {
      if (token) {
        const user = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('usernameDisplay').textContent = user.username;
        document.getElementById('userNav').style.display = 'flex';
        document.getElementById('guestNav').style.display = 'none';
      } else {
        document.getElementById('userNav').style.display = 'none';
        document.getElementById('guestNav').style.display = 'block';
      }
    }

    async function loadAllPastes() {
      try {
        const url = '/api/pastes/all';
        console.log('Loading pastes from:', url);
        const res = await fetch(url);
        console.log('Response:', res.status, res.statusText);
        if (!res.ok) throw new Error('API error: ' + res.status);
        const pastes = await res.json();
        console.log('Got pastes:', pastes.length);
        const list = document.getElementById('pastesList');
        if (!pastes.length) {
          list.innerHTML = '<p class="text-muted text-center">暂无内容</p>';
          return;
        }
        list.innerHTML = pastes.map(p => {
          const isOwner = token && JSON.parse(atob(token.split('.')[1])).username === p.username;
          return `
          <div class="card paste-card">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                  <span class="badge bg-secondary">${langLabels[p.language] || p.language}</span>
                  <span class="text-muted ms-2">${p.username}</span>
                  <small class="text-muted ms-2">${new Date(p.created_at).toLocaleString()}</small>
                </div>
                <div>
                  <a href="?s=${p.short_code}" class="btn btn-sm btn-outline-primary">访问</a>
                  ${isOwner ? `<button class="btn btn-sm btn-outline-danger ms-1" onclick="deletePaste(${p.id})">删除</button>` : ''}
                </div>
              </div>
              <div class="paste-summary">${escapeHtml(p.content)}</div>
            </div>
          </div>
        `}).join('');
      } catch (e) {
        console.error(e);
        const errorMsg = e.message || e.toString() || 'Unknown error';
        document.getElementById('pastesList').innerHTML = '<p class="text-muted text-center">加载失败: ' + errorMsg + '</p>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function deletePaste(id) {
      if (!confirm('确定要删除这条代码吗？')) return;
      try {
        const res = await fetch(`${API_URL}/pastes/${id}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
        if (res.ok) {
          loadAllPastes();
        } else {
          const data = await res.json();
          alert(data.error || '删除失败');
        }
      } catch (e) {
        alert('删除失败: ' + e.message);
      }
    }

    function showAuthModal(type) {
      document.getElementById('authModalTitle').textContent = type === 'login' ? '登录' : '注册';
      document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
      refreshCaptcha();
      authModal.show();
    }

    async function refreshCaptcha() {
      try {
        const res = await fetch(`${API_URL}/captcha`);
        const data = await res.json();
        captchaKey = data.key;
        document.getElementById('loginCaptchaQuestion').textContent = data.question;
        document.getElementById('registerCaptchaQuestion').textContent = data.question;
        document.getElementById('loginCaptcha').value = '';
        document.getElementById('registerCaptcha').value = '';
      } catch (e) {
        console.error('Failed to load captcha:', e);
      }
    }

    async function doLogin() {
      const res = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          username: document.getElementById('loginUsername').value, 
          password: document.getElementById('loginPassword').value,
          captchaKey: captchaKey,
          captchaAnswer: document.getElementById('loginCaptcha').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        token = data.token;
        localStorage.setItem('token', token);
        authModal.hide();
        updateNav();
        loadAllPastes();
      } else {
        alert(data.error);
        refreshCaptcha();
      }
    }

    async function doRegister() {
      const res = await fetch(`${API_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          username: document.getElementById('registerUsername').value, 
          password: document.getElementById('registerPassword').value,
          captchaKey: captchaKey,
          captchaAnswer: document.getElementById('registerCaptcha').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        alert('注册成功，请登录');
        showAuthModal('login');
      } else {
        alert(data.error);
      }
    }

    function showCreateModal() {
      document.getElementById('pasteContent').value = '';
      document.getElementById('pasteLanguage').value = 'plaintext';
      createModal.show();
    }

    async function doCreatePaste() {
      const content = document.getElementById('pasteContent').value;
      const language = document.getElementById('pasteLanguage').value;
      if (!content.trim()) return alert('内容不能为空');
      const res = await fetch(`${API_URL}/pastes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ content, language })
      });
      if (res.ok) {
        const data = await res.json();
        createModal.hide();
        window.location.href = '?s=' + data.short_code;
      }
    }

    document.getElementById('logoutBtn').onclick = () => {
      token = null;
      localStorage.removeItem('token');
      updateNav();
      loadAllPastes();
    };
  </script>
</body>
</html>
